<aside class="data-sidebar">

  <!-- Brand mini -->
  <div class="sidebar-brand">
    <span>Données IA</span>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">

    <!-- Import -->
    <div class="nav-section">
      <span class="nav-section-label">Import</span>

      <!-- Importer -->
      <a routerLink="/upload" routerLinkActive="active" class="nav-item">
        <div class="nav-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
        </div>
        <span>Importer</span>
      </a>

      <!-- Datasets -->
      <a routerLink="/datasets" routerLinkActive="active" class="nav-item">
        <div class="nav-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
          </svg>
        </div>
        <span>Mes datasets</span>
        <span class="nav-badge" *ngIf="datasetCount > 0">{{ datasetCount }}</span>
      </a>
    </div>

    <!-- Navigation -->
    <div class="nav-section">
      <span class="nav-section-label">Navigation</span>

      <!-- Dashboard -->
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <div class="nav-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
          </svg>
        </div>
        <span>Dashboard</span>
      </a>

      <!-- Profil -->
      <a routerLink="/profile" routerLinkActive="active" class="nav-item">
        <div class="nav-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <span>Mon profil</span>
      </a>

      <!-- Nettoyage -->
      <a routerLink="/cleaning" routerLinkActive="active" class="nav-item">
        <div class="nav-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18"></path>
            <path d="M8 6v12"></path>
            <path d="M16 6v12"></path>
            <path d="M5 6l1-3h12l1 3"></path>
          </svg>
        </div>
        <span>Nettoyage</span>
      </a>

      <!-- Admin: Utilisateurs -->
      <a routerLink="/admin/users"
         routerLinkActive="active"
         class="nav-item admin-item"
         *ngIf="isAdmin">
        <div class="nav-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
        </div>
        <span>Utilisateurs</span>
      </a>

    </div>

  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      Déconnexion
    </button>
  </div>

</aside>
