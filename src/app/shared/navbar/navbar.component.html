<!-- ===== MODE PUBLIC : logo seulement ===== -->
<nav class="navbar" *ngIf="isPublicRoute">
  <div class="navbar-brand">
    <div class="brand-logo">
      <svg width="36" height="36" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="url(#gradP)"/>
        <path d="M10 20 L20 10 L30 20 L20 30 Z" fill="white" fill-opacity="0.85"/>
        <circle cx="20" cy="20" r="5" fill="white"/>
        <defs>
          <linearGradient id="gradP" x1="0" y1="0" x2="40" y2="40">
            <stop offset="0%" stop-color="#2563EB"/>
            <stop offset="100%" stop-color="#7C3AED"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="brand-name">Decision <span class="brand-ai">AI</span></span>
    </div>
  </div>
</nav>

<!-- ===== MODE CONNECTÉ : navbar complète ===== -->
<nav class="navbar" *ngIf="!isPublicRoute">

  <!-- Brand -->
  <div class="navbar-brand">
    <div class="brand-logo" (click)="goToDashboard()" style="cursor:pointer">
      <svg width="36" height="36" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="url(#grad)"/>
        <path d="M10 20 L20 10 L30 20 L20 30 Z" fill="white" fill-opacity="0.85"/>
        <circle cx="20" cy="20" r="5" fill="white"/>
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40">
            <stop offset="0%" stop-color="#2563EB"/>
            <stop offset="100%" stop-color="#7C3AED"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="brand-name">Decision <span class="brand-ai">AI</span></span>
    </div>
  </div>

  <!-- Nav Links -->
  <ul class="navbar-links">
    <li>
      <a class="nav-link" routerLink="/dashboard"
         routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
        </svg>
        Tableau de bord
      </a>
    </li>
    <li>
      <a class="nav-link" routerLink="/analytics" routerLinkActive="active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"></line>
          <line x1="12" y1="20" x2="12" y2="4"></line>
          <line x1="6" y1="20" x2="6" y2="14"></line>
        </svg>
        Analytique
      </a>
    </li>
    <li>
      <a class="nav-link" routerLink="/kpis" routerLinkActive="active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
        KPIs
      </a>
    </li>
    <li>
      <a class="nav-link" routerLink="/chat"
         routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        Chat IA
      </a>
    </li>
    <li *ngIf="isAdmin">
      <a class="nav-link admin-link" routerLink="/admin/users" routerLinkActive="active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        Administration
      </a>
    </li>
  </ul>

  <!-- Right Actions -->
  <div class="navbar-right">

    <!-- Search -->
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" placeholder="Recherche..." class="search-input" />
    </div>

    <!-- Notifications -->
    <button class="icon-btn" title="Notifications">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
      <span class="notif-dot"></span>
    </button>

    <!-- Settings -->
    <button class="icon-btn" title="Paramètres">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>

    <!-- User dropdown -->
    <div class="user-menu">
      <button class="user-btn">
        <div class="user-avatar">{{ userInitials }}</div>
        <div class="user-info">
          <span class="user-name">{{ userFullName }}</span>
          <span class="user-role">{{ isAdmin ? 'Admin' : 'Utilisateur' }}</span>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>

      <div class="dropdown">
        <a href="#" class="dropdown-item" (click)="goToProfile(); $event.preventDefault()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          Mon profil
        </a>
        <a href="#" class="dropdown-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          Paramètres
        </a>
        <div class="dropdown-divider"></div>
        <a href="#" class="dropdown-item logout" (click)="logout(); $event.preventDefault()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Déconnexion
        </a>
      </div>
    </div>

  </div>

  <!-- Mobile toggle -->
  <button class="mobile-toggle" (click)="toggleMenu()">
    <span></span><span></span><span></span>
  </button>

</nav>

<!-- Mobile menu (connecté seulement) -->
<div class="mobile-menu" id="mobileMenu" *ngIf="!isPublicRoute">
  <a class="mobile-link" routerLink="/dashboard"
     routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
    Tableau de bord
  </a>
  <a class="mobile-link" routerLink="/analytics" routerLinkActive="active">Analytique</a>
  <a class="mobile-link" routerLink="/kpis"      routerLinkActive="active">KPIs</a>
  <a class="mobile-link" routerLink="/chat"      routerLinkActive="active">Chat IA</a>
  <a *ngIf="isAdmin" class="mobile-link" routerLink="/admin/users" routerLinkActive="active">
    Administration
  </a>
  <div class="mobile-divider"></div>
  <a href="#" class="mobile-link" (click)="goToProfile(); $event.preventDefault()">Profil</a>
  <a href="#" class="mobile-link logout-mobile" (click)="logout(); $event.preventDefault()">
    Déconnexion
  </a>
</div>
