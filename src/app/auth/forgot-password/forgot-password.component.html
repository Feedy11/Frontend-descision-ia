<div class="forgot-wrapper">

    <div class="forgot-card">
  
      <!--Saisir l'email -->
      <div *ngIf="step === 1">
  
        <div class="card-header">
          <div class="header-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
          <h2>Mot de passe oublié ?</h2>
          <p>Entrez votre email pour recevoir un lien de réinitialisation.</p>
        </div>
  
        <div class="alert-error" *ngIf="errorMsg">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          {{ errorMsg }}
        </div>
  
        <form (ngSubmit)="sendResetLink()">
  
          <div class="field-group" [class.has-error]="emailError">
            <label for="email">Adresse email</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
              <input
                type="email"
                id="email"
                class="form-input"
                placeholder="votre@email.com"
                [(ngModel)]="email"
                name="email"
                autocomplete="email"
              />
            </div>
            <span class="field-error">{{ emailError }}</span>
          </div>
  
          <button type="submit" class="btn-primary" [disabled]="isLoading">
            <span *ngIf="!isLoading">Envoyer le lien</span>
            <span class="btn-loader" *ngIf="isLoading">
              <svg class="spin" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
              </svg>
              Envoi en cours...
            </span>
          </button>
  
        </form>
  
      </div>
  
      <!-- Email envoyé -->
      <div *ngIf="step === 2" class="success-state">
  
        <div class="success-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
        </div>
  
        <h2>Email envoyé !</h2>
        <p>Un lien de réinitialisation a été envoyé à<br/><strong>{{ email }}</strong></p>
        <p class="hint">Vérifiez aussi vos spams. Le lien expire dans <strong>15 minutes</strong>.</p>
  
        <button class="btn-resend" [disabled]="resendCooldown > 0" (click)="sendResetLink()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"></polyline>
            <path d="M3.51 15a9 9 0 1 0 .49-3.5"></path>
          </svg>
          <span *ngIf="resendCooldown === 0">Renvoyer l'email</span>
          <span *ngIf="resendCooldown > 0">Renvoyer dans {{ resendCooldown }}s</span>
        </button>
  
      </div>
  
      <!-- Retour login -->
      <a routerLink="/login" class="back-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Retour à la connexion
      </a>
  
    </div>

  </div>
